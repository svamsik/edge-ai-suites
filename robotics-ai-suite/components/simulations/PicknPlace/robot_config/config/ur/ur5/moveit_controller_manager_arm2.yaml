---
controller_names:
  - /arm2/arm_controller
  - /arm2/gripper_controller

/arm2/arm_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - arm2/elbow_joint
    - arm2/shoulder_lift_joint
    - arm2/shoulder_pan_joint
    - arm2/wrist_1_joint
    - arm2/wrist_2_joint
    - arm2/wrist_3_joint

/arm2/gripper_controller:
  action_ns: gripper_cmd
  type: GripperCommand
  default: true
  joints:
    - arm2/left_finger_joint
