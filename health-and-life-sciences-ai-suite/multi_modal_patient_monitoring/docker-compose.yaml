services:
  patient-monitoring-assets:
    build:
      context: ./services/patient-monitoring-assets
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${HTTP_PROXY}
        https_proxy: ${HTTPS_PROXY}
        no_proxy: ${NO_PROXY}
    image: intel/hl-ai-patient-monitoring-assets:1.0.0
    container_name: patient-monitoring-assets
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    volumes:
      - ./models:/models
      - ./videos:/videos
  
  patient-monitoring-aggregator:
    build:
      context: ./services/patient-monitoring-aggregator
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${HTTP_PROXY}
        https_proxy: ${HTTPS_PROXY}
        no_proxy: ${NO_PROXY}
    image: intel/hl-ai-patient-monitoring-aggregator:1.0.0
    container_name: patient-monitoring-aggregator
    environment:
      - WORKLOAD_TYPE=mdpnp
      - GRPC_PORT=50051
      - HTTP_PORT=8000
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    network_mode: "host"
    
  patient-monitoring-metrics:
    build:
      context: ./services/patient-monitoring-metrics
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${HTTP_PROXY}
        https_proxy: ${HTTPS_PROXY}
        no_proxy: ${NO_PROXY}
    image: intel/hl-ai-patient-monitoring-metrics:1.0.0
    container_name: patient-monitoring-metrics
    privileged: true
    pid: host
    network_mode: "host"
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
      - NPU_LOG=/tmp/results/npu_usage.csv
      - METRICS_DIR=/tmp/results
    volumes:
      - ./metrics:/tmp/results
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /sys/devices:/sys/devices
      - /dev/dri:/dev/dri:rw
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
    devices:
      - "/sys:/sys"
      - "/dev:/dev"
      - "/run:/run"
      - "/proc:/proc"

  mdpnp:
    build:
      context: ./services/mdpnp
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${HTTP_PROXY}
        https_proxy: ${HTTPS_PROXY}
        no_proxy: ${NO_PROXY}
    image: intel/hl-ai-mdpnp:1.0.0
    container_name: mdpnp
    network_mode: "host"
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    depends_on:
        patient-monitoring-assets:
          condition: service_completed_successfully
        patient-monitoring-aggregator:
          condition: service_started  

  dds-bridge:
    build:
      context: ./services/dds-bridge
      dockerfile: Dockerfile
    image: intel/hl-ai-dds-bridge:1.0.0
    container_name: dds-bridge
    environment:
      - GRPC_HOST=localhost
      - GRPC_PORT=50051
    depends_on:
      patient-monitoring-aggregator:
        condition: service_started
      # mdpnp:
      #   condition: service_started
    network_mode: "host"

  ai-ecg:
    build:
      context: ./services/ai-ecg/backend
      dockerfile: Dockerfile
      args:
          HTTP_PROXY: ${HTTP_PROXY}
          HTTPS_PROXY: ${HTTPS_PROXY}
          NO_PROXY: ${NO_PROXY}
          http_proxy: ${HTTP_PROXY}
          https_proxy: ${HTTPS_PROXY}
          no_proxy: ${NO_PROXY}
    image: intel/hl-ai-ecg:1.0.0
    container_name: ai-ecg
    network_mode: "host"
    depends_on:
      patient-monitoring-assets:
        condition: service_completed_successfully
      patient-monitoring-aggregator:
          condition: service_started  
    volumes:
      - ./models:/models
      - ./videos:/videos

  3dpose-estimation:
      build:
        context: ./services/3d-pose-estimation
        dockerfile: src/Dockerfile
        args:
          HTTP_PROXY: ${HTTP_PROXY}
          HTTPS_PROXY: ${HTTPS_PROXY}
          NO_PROXY: ${NO_PROXY}
          http_proxy: ${HTTP_PROXY}
          https_proxy: ${HTTPS_PROXY}
          no_proxy: ${NO_PROXY}
      image: intel/hl-ai-3dpose:1.0.0
      container_name: 3dpose-estimation
      network_mode: "host"
      environment:
        - VIDEO_FILE=/videos/3d-pose/face-demographics-walking.mp4
        - MODEL_PATH=/models/3d-pose/human-pose-estimation-3d-0001.xml
        - DEVICE=CPU
        - AGGREGATOR_ADDRESS=localhost:50051
        - CONTROL_PORT=8083
      depends_on:
        patient-monitoring-assets:
          condition: service_completed_successfully
        patient-monitoring-aggregator:
          condition: service_started
      volumes:
      - ./models:/models
      - ./videos:/videos  
  
  rppg:
    build:
      context: ./services/rppg
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${HTTP_PROXY}
        https_proxy: ${HTTPS_PROXY}
        no_proxy: ${NO_PROXY}
    image: intel/hl-ai-rppg:1.0.0
    container_name: rppg
    network_mode: "host"
    depends_on:
      patient-monitoring-assets:
        condition: service_completed_successfully
      patient-monitoring-aggregator:
          condition: service_started  
    environment:
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    volumes:
      - ./models:/models
      - ./videos:/videos
   
