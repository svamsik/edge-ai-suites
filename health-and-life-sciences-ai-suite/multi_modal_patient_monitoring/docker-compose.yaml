services:
  model_download_service:
    image: intel/model-download:rc4_2026.0 
    container_name: model-download
    user: "0:0"
    environment:
      - MODEL_PATH=/opt/models
      - MODEL_DOWNLOAD_PORT=${MODEL_DOWNLOAD_PORT:-8000}
      - OVMS_RELEASE_TAG=${OVMS_RELEASE_TAG:-v2025.4.1}
      - HLS_3D_POSE_CHECKPOINT_URL=${HLS_3D_POSE_CHECKPOINT_URL:-https://storage.openvinotoolkit.org/repositories/open_model_zoo/public/2022.1/human-pose-estimation-3d-0001/human-pose-estimation-3d.tar.gz}
      - HLS_ECG_BASE_URL=${HLS_ECG_BASE_URL:-https://raw.githubusercontent.com/Einse57/OpenVINO_sample/master/ai-ecg-master}
      - HLS_RPPG_MODEL_URL=${HLS_RPPG_MODEL_URL:-https://github.com/xliucs/MTTS-CAN/raw/main/mtts_can.hdf5}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 180s
    network_mode: "host"  
    volumes:
      - ./models:/opt/models
      - ./videos:/videos


  patient-monitoring-aggregator:
    build:
      context: ./services/patient-monitoring-aggregator
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-patient-monitoring-aggregator:${TAG:-1.0.1}
    container_name: patient-monitoring-aggregator
    environment:
      - WORKLOAD_TYPE=mdpnp
      - GRPC_PORT=50051
      - HTTP_PORT=8000    
      - AI_ECG_PORT=${AI_ECG_PORT:-8101}
      - AI_ECG_URL=http://localhost:${AI_ECG_PORT:-8101}/predict_stream_next
    network_mode: "host"
    
  metrics-collector:
    build:
      context: ./services/metrics-collector
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-metrics-collector:${TAG:-1.0.1}
    container_name: metrics-collector
    privileged: true
    pid: host
    network_mode: "host"
    environment:
      - NPU_LOG=/tmp/results/npu_usage.csv
      - METRICS_DIR=/tmp/results
      - DEVICE_ENV_PATH=/configs/device.env
    volumes:
      - ./metrics:/tmp/results
      - ./configs:/configs
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /sys/devices:/sys/devices
      - /dev/dri:/dev/dri:rw
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro    
      - /run:/run
      - /proc:/proc:ro

  mdpnp:
    build:
      context: ./services/mdpnp
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-mdpnp:${TAG:-1.0.1}
    container_name: mdpnp
    network_mode: "host"
    depends_on:
        patient-monitoring-aggregator:
          condition: service_started  

  dds-bridge:
    build:
      context: ./services/dds-bridge
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-dds-bridge:${TAG:-1.0.1}
    container_name: dds-bridge
    environment:
      - GRPC_HOST=localhost
      - GRPC_PORT=50051
      - MDPNP_DEVICE=${MDPNP_DEVICE}
    env_file:
        - ./configs/device.env   
    depends_on:
      patient-monitoring-aggregator:
        condition: service_started
      mdpnp:
        condition: service_started
    network_mode: "host" 

  ai-ecg:
    build:
      context: ./services/ai-ecg/backend
      dockerfile: Dockerfile
      args:
        INSTALL_DRIVER_VERSION: "25.31.34666"
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-ecg:${TAG:-1.0.1}
    container_name: ai-ecg
    network_mode: "host"
    restart: on-failure
    depends_on:
      model_download_service:
        condition: service_healthy
      patient-monitoring-aggregator:
        condition: service_started
    environment:
      - ECG_DEVICE=${ECG_DEVICE}  
      - ZE_ENABLE_ALT_DRIVERS=libze_intel_npu.so   
      - AI_ECG_PORT=${AI_ECG_PORT:-8101}
      - MODEL_DOWNLOAD_URL=http://localhost:${MODEL_DOWNLOAD_PORT:-8000}
    env_file:
      - ./configs/device.env  
    volumes:
      - ./models:/models
      - ./videos:/videos
      - ./configs:/configs
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/accel/accel0:/dev/accel/accel0" 
    group_add:
      - video
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${AI_ECG_PORT:-8101}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  3dpose-estimation:
      build:
        context: ./services/3d-pose-estimation
        dockerfile: Dockerfile
        args:
          HTTP_PROXY: ${HTTP_PROXY}
          HTTPS_PROXY: ${HTTPS_PROXY}
          NO_PROXY: ${NO_PROXY}
          INSTALL_DRIVER_VERSION: "25.31.34666"
      image: intel/hl-ai-3dpose:${TAG:-1.0.1}
      container_name: 3dpose-estimation
      network_mode: "host"
      restart: on-failure
      environment:
        - VIDEO_FILE=/videos/3d-pose/face-demographics-walking.mp4
        - MODEL_PATH=/models/3d-pose/human-pose-estimation-3d-0001.xml
        - AGGREGATOR_ADDRESS=localhost:50051
        - SOURCE_ID=3d-pose-camera-1
        - DEVICE_CONFIG_PATH=/app/configs/device.yaml
        - DEPLOYMENT_ENV=production
        - POSE_3D_DEVICE=${POSE_3D_DEVICE:-GPU}
        - CONTROL_PORT=8083     
        - ZE_ENABLE_ALT_DRIVERS=libze_intel_npu.so  
        - MODEL_DOWNLOAD_URL=http://localhost:${MODEL_DOWNLOAD_PORT:-8000}
      env_file:
        - ./configs/device.env
      depends_on:
        model_download_service:
          condition: service_healthy
        patient-monitoring-aggregator:
          condition: service_started
      volumes:
        - ./models:/models
        - ./videos:/videos 
        - ./configs:/configs
      devices:
        - "/dev/dri:/dev/dri"
        - "/dev/accel/accel0:/dev/accel/accel0" 
      group_add:
        - video
      healthcheck:
        test: ["CMD-SHELL", "curl -f http://localhost:${CONTROL_PORT:-8083}/status || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 600s
  
  rppg:
    build:
      context: ./services/rppg
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-rppg:${TAG:-1.0.1}
    container_name: rppg
    network_mode: "host"
    restart: on-failure
    depends_on:
      model_download_service:
        condition: service_healthy
      patient-monitoring-aggregator:
          condition: service_started  
    environment:
      - RPPG_DEVICE=${RPPG_DEVICE}  
      - ZE_ENABLE_ALT_DRIVERS=libze_intel_npu.so    
      - MODEL_DOWNLOAD_URL=http://localhost:${MODEL_DOWNLOAD_PORT:-8000}
    env_file:
      - ./configs/device.env  
    volumes:
      - ./models:/models
      - ./videos:/videos
      - ./configs:/configs
    devices:
      - "/dev/dri:/dev/dri" 
      - "/dev/accel/accel0:/dev/accel/accel0" 
    group_add:
      - video      
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
   
  ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: intel/hl-ai-ui:${TAG:-1.0.1}
    container_name: ui  
    ports:
      - "3000:3000"
    depends_on:
      patient-monitoring-aggregator:
        condition: service_started     
      ai-ecg:
        condition: service_healthy
      3dpose-estimation:
        condition: service_healthy
      rppg:
        condition: service_healthy       

  


