apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ui

  template:
    metadata:
      labels:
        app: ui

    spec:
      containers:
        - name: ui

          image: "{{ .Values.ui.image.repository }}/{{ .Values.ui.image.name }}:{{ .Values.ui.image.tag }}"

          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}

          ports:
            - containerPort: 3000

          env:
            # Use ingress path instead of NodePort
            - name: VITE_API_BASE_URL
              value: "/api"

            # Pose MJPEG stream exposed via ingress
            - name: VITE_POSE_STREAM_URL
              value: "/video_feed"
